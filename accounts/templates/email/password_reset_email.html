<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Redefinição de senha</title>
</head>
<body>
    <p>Olá, {{ username }}.</p>

    <p>
        Recebemos uma solicitação para redefinir
        sua senha no GymControl.
    </p>

    <p>
        Seu código de recuperação é:
    </p>

    <p>
        <strong>{{ token }}</strong>
    </p>

    <p>
        Esse código é válido por 15 minutos.
    </p>

    <p>
        Caso você não tenha solicitado a redefinição,
        ignore esta mensagem.
    </p>
</body>
</html>
